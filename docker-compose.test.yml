services:
  test-pg:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: librechat_test
    ports:
      - "54330:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d librechat_test"]
      interval: 1s
      timeout: 3s
      retries: 30
